name: Update docs

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  DOCS_PR_BRANCH: chore/bot-regenerate-cli-docs

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-docs-main
  cancel-in-progress: false

jobs:
  generate-docs-pr:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.ref != 'chore/bot-regenerate-cli-docs' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: 1.25

      - name: Generate markdown documentation
        run: make docs

      - name: Open or update pull request for doc changes
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            docs
          commit-message: "chore: regenerate CLI documentation"
          branch: ${{ env.DOCS_PR_BRANCH }}
          base: main
          delete-branch: true
          title: "chore: regenerate CLI documentation"
          body: |
            Regenerated Cobra command markdown in `docs/` after a merge to `main`.

            Merge this when you want the public docs in sync, or close if the changes are already included elsewhere.
          draft: false
